name: release-main

on:
  release:
    types: [published]

jobs:

  set-version:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Export tag
        id: vars
        run: echo tag=${GITHUB_REF#refs/*/} >> $GITHUB_OUTPUT

      - name: Update project version
        run: |
          VERSION="${RELEASE_VERSION#v}"
          CURRENT=$(grep -P '^version = ' pyproject.toml | sed 's/version = "//;s/"//')
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "Version already set to $VERSION, skipping commit."
          else
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pyproject.toml
            git commit -m "chore: bump version to $VERSION"
            git push
          fi
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.tag }}

  build_wheels:
    needs: [set-version]
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15-intel is an intel runner, macos-14 is apple silicon
        # We could add other ARM builds here if we need them
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-14]

    steps:
      - uses: actions/checkout@v6

      # Used to host cibuildwheel
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.2.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse goals

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  build_sdist:
    needs: [set-version]
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        run: pipx run build --sdist goals

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-sdist
          path: goals/dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/goals-sa
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

    steps:
      - uses: actions/download-artifact@v8
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # To test
          # repository-url: https://test.pypi.org/legacy/
          repository-url: https://upload.pypi.org/legacy/

  deploy-docs:
    needs: upload_pypi
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Deploy documentation
        run: uv run mkdocs gh-deploy --force
